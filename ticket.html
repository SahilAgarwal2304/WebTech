<!DOCTYPE html>

    <div class="logo-text">The Bishop's Co-Ed School KLN</div>
  </div>

  <!-- navbar -->
  <nav class="floating-nav" id="floatingNav">
    <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>

    <div class="ticket-card" id="ticketDisplay">
      <h2 class="text-center gold-text">Your Ticket</h2>
      <div class="ticket-detail-card mt-4">
        <p><strong>Event:</strong> Annual Cultural Fest 2026</p>
        <p><strong>Category:</strong> <span id="displayCategory"></span></p>
        <p><strong>Ticket ID:</strong> <span id="displayTicketId"></span></p>

        <p><strong>Phone:</strong> <span id="displayPhone"></span></p>
